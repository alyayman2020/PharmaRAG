[project]
name = "spl-parser"
version = "0.1.0"
description = "HL7 SPL (FDA Structured Product Labeling) XML parser"
requires-python = ">=3.12"
dependencies = ["lxml>=5.2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/spl_parser"]
