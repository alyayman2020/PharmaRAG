name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    name: deterministic gates ($0 — no network, no OpenAI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Types (mypy --strict)
        run: uv run mypy src

      - name: Deterministic safety gates
        run: uv run pytest -m deterministic -q
